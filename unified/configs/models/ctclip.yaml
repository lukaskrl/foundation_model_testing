# CT-CLIP: single-bottleneck VAE encoder — see docs/HEAD_DESIGN.md for fairness caveat.
# Adapter uses learned upsampling to synthesize the 4-level pyramid.
model:
  name: ctclip
  batch_size: 3   # VRAM sweep: 40.7/51.5 GB reserved at eff=6 (96^3 patch); bs4 = 50.2 GB
  weights: /store/home/skrljl/projects/foundation_models/weights/CT-CLIP/models/CT-CLIP-Related/CT-CLIP_v2.pt
  kwargs:
    # These match CT-CLIP/scripts/run_train.py exactly. dim_head was 32 in
    # pretraining (CTViT default is 64 — don't trust the default).
    dim: 512
    codebook_size: 8192
    image_size: 480
    patch_size: 20
    temporal_patch_size: 10
    spatial_depth: 4
    temporal_depth: 4
    dim_head: 32
    heads: 8
    use_image_encoder_only: true   # we discard the text branch
    # Probe-honest pyramid: synthesize all 5 contract levels by channel-
    # projecting + trilinearly resampling the CTViT bottleneck (no fresh
    # SpatialPriorModule conv on the raw input). A frozen run then measures the
    # pretrained representation itself, symmetric with the CNN encoders' 1x1
    # neck. Set to `spm` to restore the raw-input conv branch (ablation).
    pyramid_mode: upsample
