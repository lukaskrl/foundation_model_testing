model:
  name: voco_b
  # bs=2: VRAM sweep peak 25.3 GB / 32.3 GB reserved — safe headroom for the
  # validation sliding-window spike on the 48 GB RTX 6000 Ada. bs=3 reserves
  # 48.2 GB (sweep flagged [OVER] the 46 GB safe cap); it runs standalone but
  # OOM-crashed at step 0 in the back-to-back batch under the slightest
  # contention from a preceding run.
  batch_size: 2
  weights: /store/home/skrljl/projects/foundation_models/weights/VoCo/VoComni_B.pt
  kwargs:
    feature_size: 48
    use_v2: true
    in_chans: 1
