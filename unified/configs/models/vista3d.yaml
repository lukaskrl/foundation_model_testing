model:
  name: vista3d
  batch_size: 3   # VRAM sweep: 37.3/51.5 GB reserved (fp32) at eff=6; bs4 = 49.5 GB
  # fp16 AMP diverged in the prior sweep around epoch 78 (loss-scaler couldn't
  # recover); fp32 is ~30% slower but stable.
  amp: false
  weights: /store/home/skrljl/projects/foundation_models/weights/VISTA/vista3d_pretrained_model/model_monai1.3.pt
  kwargs:
    # Match VISTA-3D's pretraining: 5 stages, init_filters=48
    # → native channels (48, 96, 192, 384, 768) at strides (1, 2, 4, 8, 16).
    # Adapter selects stages [1..4] for the pyramid contract.
    init_filters: 48
    blocks_down: [1, 2, 2, 4, 4]
    in_channels: 1
    norm: instance
