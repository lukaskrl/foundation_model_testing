model:
  name: suprem_swinunetr
  # SuPreM SwinUNETR (62.19M params). Pretrained on AbdomenAtlas 1.1 with
  # supervised multi-organ + tumor segmentation. Same arch as VoCo-B but
  # different pretraining objective + use_v2=false.
  batch_size: 2
  weights: /store/home/skrljl/projects/foundation_models/weights/SuPreM/supervised_suprem_swinunetr_2100.pth
  preprocessing:
    # SuPreM's downstream pipelines all use a narrow soft-tissue HU window.
    intensity:
      a_min: -175.0
      a_max: 250.0
      b_min: 0.0
      b_max: 1.0
      clip: true
  kwargs:
    feature_size: 48
    in_chans: 1
    use_v2: false
