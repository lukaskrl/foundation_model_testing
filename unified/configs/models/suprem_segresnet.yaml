model:
  name: suprem_segresnet
  # SuPreM SegResNet (4.70M params — smallest of the SuPreM family).
  # Different layer naming than VISTA/CT-FM SegResEncoder: MONAI SegResNet's
  # convInit/down_layers/up_layers structure, init_filters=16.
  batch_size: 5   # VRAM sweep: 46.5/51.5 GB reserved at eff=10; bs6 OOMs
  weights: /store/home/skrljl/projects/foundation_models/weights/SuPreM/supervised_suprem_segresnet_2100.pth
  preprocessing:
    intensity:
      a_min: -175.0
      a_max: 250.0
      b_min: 0.0
      b_max: 1.0
      clip: true
  kwargs:
    init_filters: 16
    blocks_down: [1, 2, 2, 4]
    blocks_up: [1, 1, 1]
    in_channels: 1
    out_channels: 32      # matches SuPreM's organ_embedding dimensionality
    norm: instance
